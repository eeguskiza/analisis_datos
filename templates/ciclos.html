{% extends "base.html" %}
{% block title %}Ciclos — {{ app_name }}{% endblock %}
{% block page_title %}Piezas/hora por referencia{% endblock %}

{% block content %}
<div x-data="ciclosEditor()" x-init="loadCiclos()" class="max-w-5xl mx-auto space-y-4">

  <!-- Toolbar -->
  <div class="flex items-center justify-between">
    <div class="flex gap-2 items-center">
      <input type="text" x-model="filter" placeholder="Buscar maquina o referencia..."
             class="input-inline w-64 text-sm">
      <span class="text-xs text-gray-400" x-show="filter" x-text="filteredRows().length + ' resultados'"></span>
    </div>
    <div class="flex gap-2 items-center">
      <span x-show="zeroCount > 0" class="text-xs text-amber-600 font-medium" x-text="zeroCount + ' sin valor'"></span>
      <button @click="guardar()" class="btn-primary btn-sm" :disabled="saving">
        <span x-show="saving" class="spinner border-white"></span>
        Guardar
      </button>
      <span x-show="saved" x-transition class="text-xs text-green-600">OK</span>
    </div>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="text-center py-16 text-gray-400"><span class="spinner border-brand-600"></span></div>
  </template>

  <!-- Cards por seccion > maquina -->
  <template x-if="!loading">
    <div class="space-y-4">
      <template x-for="[seccion, maquinas] in groupedEntries()" :key="seccion">
        <div class="bg-white rounded-xl border border-surface-200 shadow-sm overflow-hidden">
          <!-- Seccion header -->
          <div class="px-5 py-3 border-b border-surface-200 flex items-center gap-2">
            <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold"
                  :class="seccion === 'LINEAS' ? 'bg-blue-100 text-blue-800' : seccion === 'TALLADORAS' ? 'bg-amber-100 text-amber-800' : 'bg-gray-100 text-gray-600'"
                  x-text="seccion"></span>
            <span class="text-xs text-gray-400" x-text="countInSection(seccion) + ' refs'"></span>
          </div>

          <!-- Maquinas -->
          <template x-for="[maquina, refs] in maquinas" :key="maquina">
            <div x-data="{ open: true }">
              <button @click="open = !open"
                      class="flex items-center gap-3 w-full px-5 py-2.5 text-left hover:bg-surface-50 border-b border-surface-100">
                <svg class="w-3 h-3 text-gray-400 transition-transform" :class="open && 'rotate-90'" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/>
                </svg>
                <span class="font-mono font-bold text-brand-700" x-text="maquina"></span>
                <span class="text-xs text-gray-400" x-text="refs.length + ' refs'"></span>
              </button>
              <div x-show="open" x-transition>
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-px bg-surface-100">
                  <template x-for="row in refs" :key="row.id || row._tmp">
                    <div class="bg-white px-4 py-2.5 flex items-center justify-between gap-2"
                         :class="row.tiempo_ciclo === 0 && 'bg-amber-50'">
                      <span class="font-mono text-xs text-gray-600 truncate" x-text="row.referencia"></span>
                      <input type="number" x-model.number="row.tiempo_ciclo" step="1" min="0"
                             class="w-16 px-2 py-1 text-xs text-right font-mono border rounded focus:outline-none focus:ring-2 focus:ring-brand-400"
                             :class="row.tiempo_ciclo === 0 ? 'border-amber-400 bg-amber-50' : 'border-surface-200'">
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Nuevo -->
      <div x-data="{ showAdd: false }" class="flex items-center gap-2">
        <button @click="showAdd = !showAdd" class="btn-ghost btn-sm text-xs">+ Nuevo ciclo</button>
        <div x-show="showAdd" x-transition class="flex gap-2 items-center">
          <input type="text" x-ref="nm" placeholder="maquina" class="input-inline w-24 text-xs font-mono">
          <input type="text" x-ref="nr" placeholder="referencia" class="input-inline w-28 text-xs font-mono">
          <input type="number" x-ref="nt" placeholder="pzs/h" class="input-inline w-16 text-xs">
          <button @click="addManual($refs.nm.value,$refs.nr.value,$refs.nt.value); showAdd=false" class="btn-primary btn-sm text-xs">Anadir</button>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function ciclosEditor() {
  let _tmpId = 0;
  return {
    rows: [], filter: '', loading: true, saving: false, saved: false,

    get zeroCount() { return this.rows.filter(r => r.tiempo_ciclo === 0).length; },

    filteredRows() {
      if (!this.filter) return this.rows;
      const f = this.filter.toLowerCase();
      return this.rows.filter(r => r.maquina.toLowerCase().includes(f) || r.referencia.toLowerCase().includes(f));
    },

    groupedEntries() {
      const groups = {};
      for (const row of this.filteredRows()) {
        const sec = getSectionForResource(row.maquina);
        if (!groups[sec]) groups[sec] = {};
        if (!groups[sec][row.maquina]) groups[sec][row.maquina] = [];
        groups[sec][row.maquina].push(row);
      }
      return Object.entries(groups).sort().map(([sec, maqs]) => [sec, Object.entries(maqs).sort()]);
    },

    countInSection(sec) {
      return this.rows.filter(r => getSectionForResource(r.maquina) === sec).length;
    },

    async loadCiclos() {
      this.loading = true;
      const res = await fetch('/api/ciclos');
      const data = await res.json();
      this.rows = (data.rows || []).map(r => ({ ...r, _tmp: null }));
      this.loading = false;
    },

    addManual(m, r, t) {
      if (!m || !r) return;
      this.rows.push({ id: null, maquina: m.trim(), referencia: r.trim(), tiempo_ciclo: parseFloat(t) || 0, _tmp: 'new_' + (++_tmpId) });
    },

    async guardar() {
      this.saving = true;
      await fetch('/api/ciclos', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: this.rows.map(r => ({ maquina: r.maquina, referencia: r.referencia, tiempo_ciclo: r.tiempo_ciclo })) }),
      });
      await fetch('/api/ciclos/sync-csv', { method: 'POST' });
      this.saving = false;
      this.saved = true;
      setTimeout(() => this.saved = false, 2000);
      showToast('Ciclos guardados');
      await this.loadCiclos();
    }
  };
}
</script>
{% endblock %}
