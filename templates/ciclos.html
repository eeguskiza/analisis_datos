{% extends "base.html" %}
{% block title %}Ciclos — OEE Planta{% endblock %}
{% block page_title %}Tiempos de ciclo ideales (pzs/hora){% endblock %}

{% block content %}
<div x-data="ciclosEditor()" x-init="loadCiclos()" class="space-y-6">

  <!-- Toolbar -->
  <div class="flex items-center justify-between">
    <div class="flex gap-2">
      <!-- View toggle -->
      <button @click="view = 'grouped'" class="btn-sm"
              :class="view === 'grouped' ? 'btn-primary' : 'btn-ghost'">Por seccion</button>
      <button @click="view = 'flat'" class="btn-sm"
              :class="view === 'flat' ? 'btn-primary' : 'btn-ghost'">Lista plana</button>
    </div>
    <div class="flex gap-2 items-center">
      <input type="text" x-model="filter" placeholder="Filtrar..."
             class="input-inline w-48 text-xs">
      <button @click="addRow()" class="btn-ghost btn-sm">+ Anadir</button>
      <button @click="guardar()" class="btn-primary btn-sm" :disabled="saving">
        <span x-show="saving" class="spinner border-white"></span>
        Guardar todo
      </button>
      <button @click="syncCsv()" class="btn-ghost btn-sm" title="Exporta a ciclos.csv para los modulos OEE">
        Sync CSV
      </button>
      <span x-show="saved" x-transition class="text-sm text-green-600">Guardado</span>
    </div>
  </div>

  <!-- GROUPED VIEW -->
  <template x-if="view === 'grouped' && !loading">
    <div class="space-y-4">
      <template x-for="[seccion, maquinas] in groupedEntries()" :key="seccion">
        <div class="card">
          <div class="card-header flex items-center gap-2">
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold"
                  :class="seccion === 'LINEAS' ? 'bg-blue-100 text-blue-800' : seccion === 'TALLADORAS' ? 'bg-amber-100 text-amber-800' : 'bg-gray-100 text-gray-600'"
                  x-text="seccion"></span>
            <span class="text-xs font-normal text-gray-400" x-text="countInSection(seccion) + ' referencias'"></span>
          </div>
          <div class="divide-y divide-surface-100">
            <template x-for="[maquina, refs] in maquinas" :key="maquina">
              <div x-data="{ open: true }" class="px-4 py-2">
                <button @click="open = !open" class="flex items-center gap-2 w-full text-left">
                  <svg class="w-3 h-3 text-gray-400 transition-transform" :class="open && 'rotate-90'" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/>
                  </svg>
                  <span class="font-mono font-semibold text-sm text-brand-700" x-text="maquina"></span>
                  <span class="text-xs text-gray-400" x-text="refs.length + ' refs'"></span>
                </button>
                <div x-show="open" x-transition class="mt-2 ml-5">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>Referencia</th>
                        <th class="w-36">Pzs/hora</th>
                        <th class="w-12"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="row in refs" :key="row.id || row._tmp">
                        <tr :class="row.tiempo_ciclo === 0 && 'row-warning'">
                          <td>
                            <input type="text" x-model="row.referencia" class="input-inline text-xs font-mono">
                          </td>
                          <td>
                            <input type="number" x-model.number="row.tiempo_ciclo" step="1" min="0"
                                   class="input-inline text-xs" :class="row.tiempo_ciclo === 0 && 'border-amber-400 bg-amber-50'">
                          </td>
                          <td>
                            <button @click="removeRow(row)" class="text-red-400 hover:text-red-600 p-1">
                              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                              </svg>
                            </button>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- FLAT VIEW -->
  <template x-if="view === 'flat' && !loading">
    <div class="card">
      <div class="overflow-x-auto" style="max-height: 65vh;">
        <table class="data-table">
          <thead class="sticky top-0 z-10">
            <tr>
              <th class="w-28">Seccion</th>
              <th class="w-32">Maquina</th>
              <th>Referencia</th>
              <th class="w-32">Pzs/hora</th>
              <th class="w-12"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="row in filteredRows()" :key="row.id || row._tmp">
              <tr :class="row.tiempo_ciclo === 0 && 'row-warning'">
                <td>
                  <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                        :class="getSection(row.maquina) === 'LINEAS' ? 'bg-blue-100 text-blue-800' : getSection(row.maquina) === 'TALLADORAS' ? 'bg-amber-100 text-amber-800' : 'bg-gray-100 text-gray-600'"
                        x-text="getSection(row.maquina)"></span>
                </td>
                <td><input type="text" x-model="row.maquina" class="input-inline text-xs font-mono"></td>
                <td><input type="text" x-model="row.referencia" class="input-inline text-xs font-mono"></td>
                <td>
                  <input type="number" x-model.number="row.tiempo_ciclo" step="1" min="0"
                         class="input-inline text-xs" :class="row.tiempo_ciclo === 0 && 'border-amber-400 bg-amber-50'">
                </td>
                <td>
                  <button @click="removeRow(row)" class="text-red-400 hover:text-red-600 p-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Loading -->
  <template x-if="loading">
    <div class="card card-body text-center py-12 text-gray-400">
      <span class="spinner border-brand-600"></span> Cargando ciclos...
    </div>
  </template>

  <!-- Footer stats -->
  <div class="flex items-center justify-between text-xs text-gray-400">
    <span><span x-text="rows.length"></span> filas total</span>
    <span x-show="zeroCount > 0" class="text-amber-600">
      <span x-text="zeroCount"></span> sin tiempo de ciclo (necesitan valor)
    </span>
  </div>
</div>

<script>
function ciclosEditor() {
  let _tmpId = 0;
  return {
    rows: [],
    view: 'grouped',
    filter: '',
    loading: true,
    saving: false,
    saved: false,

    get zeroCount() {
      return this.rows.filter(r => r.tiempo_ciclo === 0).length;
    },

    getSection(maq) { return getSectionForResource(maq); },

    filteredRows() {
      if (!this.filter) return this.rows;
      const f = this.filter.toLowerCase();
      return this.rows.filter(r =>
        r.maquina.toLowerCase().includes(f) || r.referencia.toLowerCase().includes(f)
      );
    },

    groupedEntries() {
      const groups = {};
      for (const row of this.filteredRows()) {
        const sec = this.getSection(row.maquina);
        if (!groups[sec]) groups[sec] = {};
        if (!groups[sec][row.maquina]) groups[sec][row.maquina] = [];
        groups[sec][row.maquina].push(row);
      }
      // Convert to sorted arrays
      return Object.entries(groups).sort().map(([sec, maqs]) => [
        sec,
        Object.entries(maqs).sort()
      ]);
    },

    countInSection(sec) {
      return this.rows.filter(r => this.getSection(r.maquina) === sec).length;
    },

    async loadCiclos() {
      this.loading = true;
      const res = await fetch('/api/ciclos');
      const data = await res.json();
      this.rows = (data.rows || []).map(r => ({ ...r, _tmp: null }));
      this.loading = false;
    },

    addRow() {
      _tmpId++;
      this.rows.unshift({ id: null, maquina: '', referencia: '', tiempo_ciclo: 0, _tmp: 'new_' + _tmpId });
      this.view = 'flat'; // switch to flat for new row
    },

    removeRow(row) {
      const idx = this.rows.indexOf(row);
      if (idx >= 0) this.rows.splice(idx, 1);
    },

    async guardar() {
      this.saving = true;
      await fetch('/api/ciclos', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: this.rows.map(r => ({
          maquina: r.maquina, referencia: r.referencia, tiempo_ciclo: r.tiempo_ciclo
        })) }),
      });
      // Sync CSV automatically
      await fetch('/api/ciclos/sync-csv', { method: 'POST' });
      this.saving = false;
      this.saved = true;
      setTimeout(() => this.saved = false, 2000);
      showToast('Ciclos guardados y CSV sincronizado');
      await this.loadCiclos();
    },

    async syncCsv() {
      const res = await fetch('/api/ciclos/sync-csv', { method: 'POST' });
      const data = await res.json();
      showToast(`CSV exportado: ${data.count} filas`);
    }
  };
}
</script>
{% endblock %}
