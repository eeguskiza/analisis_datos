{% extends "base.html" %}
{% block title %}Pabellon 5 — ECS Mobility{% endblock %}
{% block page_title %}Pabellon 5{% endblock %}

{% block content %}
<style>[x-cloak]{display:none!important}</style>
<div x-data="luk4Page()" x-init="init()" x-cloak class="flex flex-col h-[calc(100vh-130px)]">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div class="shrink-0 flex items-center justify-between pb-3">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
           :class="editMode ? 'bg-violet-100' : 'bg-brand-50'">
        <svg class="w-5 h-5" :class="editMode ? 'text-violet-600' : 'text-brand-600'" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5"/></svg>
      </div>
      <div>
        <span class="text-sm font-bold" :class="editMode ? 'text-violet-800' : 'text-brand-800'" x-text="editMode ? 'Editor de zonas' : 'Pabellon 5 — ECS Mobility'"></span>
        <div class="flex items-center gap-2 mt-0.5">
          <span x-show="loading" class="spinner border-gray-400 w-3 h-3"></span>
          <span x-show="!editMode" class="text-[10px] text-gray-400" x-text="timestamp ? 'IZARO ' + timestamp : ''"></span>
          <span x-show="editMode" class="text-[10px] text-violet-500">Mueve y redimensiona las zonas con los controles</span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- Modo normal: leyenda + botones -->
      <template x-if="!editMode">
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-4 text-[10px] text-gray-400">
            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500"></span>Produciendo</span>
            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-amber-500"></span>Incidencia</span>
            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-400"></span>Parada</span>
          </div>
          <button @click="openEditor()" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-brand-600 hover:bg-surface-100 transition-all shrink-0" title="Editar zonas">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
          </button>
          <button @click="refresh()" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-brand-600 hover:bg-surface-100 transition-all shrink-0">
            <svg class="w-4 h-4" :class="loading && 'animate-spin'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
        </div>
      </template>
      <!-- Modo editor: acciones -->
      <template x-if="editMode">
        <div class="flex items-center gap-2">
          <button @click="editorAdd()" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-emerald-500 text-white hover:bg-emerald-600 flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> Nueva
          </button>
          <button @click="editorSave()" class="px-4 py-1.5 rounded-lg text-xs font-bold bg-violet-600 text-white hover:bg-violet-700">Guardar</button>
          <button @click="editorCancel()" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-surface-100 text-gray-500 hover:bg-surface-200">Cancelar</button>
        </div>
      </template>
    </div>
  </div>

  <!-- ══════════════ PLANO con capa de zonas ═══════════════════════ -->
  <div x-show="!editMode" class="flex-1 min-h-0 overflow-hidden bg-white rounded-2xl border border-surface-200 shadow-sm" x-ref="planWrap">
    <div class="relative w-full h-full">
      <img src="/static/img/luk4_plano.jpg" class="w-full h-full object-contain" @load="onImgLoad($event)" x-ref="planImg">
      <!-- Capa transparente con zonas -->
      <template x-for="hs in hotspots" :key="hs.id">
        <div @click="openZone(hs.id)" class="absolute rounded cursor-pointer hover:opacity-80 border-2 transition-all flex items-center justify-center" :class="zoneClass(hs)" :style="hsStyle(hs)">
          <div class="inline-flex items-center gap-2 px-2.5 py-1.5 rounded-lg bg-white/95 border shadow-sm pointer-events-none" :class="zoneBadgeBorder(hs)">
            <span class="w-2.5 h-2.5 rounded-full shrink-0" :class="zoneDotClass(hs)"></span>
            <span class="text-sm font-mono font-black text-gray-900" x-text="hs.label"></span>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ══════════════ EDITOR: canvas separado (sin plano) ═════════ -->
  <div x-show="editMode" class="flex-1 min-h-0 flex gap-4">
    <div class="w-48 shrink-0 bg-white rounded-2xl border border-surface-200 shadow-sm flex flex-col overflow-hidden">
      <div class="px-3 py-2 border-b border-surface-100 text-[10px] font-bold text-gray-400 uppercase">Zonas</div>
      <div class="flex-1 overflow-y-auto p-1.5 space-y-1">
        <template x-for="(z, idx) in editorZones" :key="z.id">
          <button @click="editorSel = idx" class="w-full text-left px-3 py-2 rounded-lg text-xs font-mono font-bold transition-all"
                  :class="editorSel === idx ? 'bg-violet-100 text-violet-700 border border-violet-300' : 'hover:bg-surface-50 text-gray-600 border border-transparent'"
                  x-text="z.label"></button>
        </template>
        <div x-show="editorZones.length === 0" class="text-center py-8 text-[10px] text-gray-300">Pulsa "Nueva"</div>
      </div>
    </div>
    <div class="flex-1 flex flex-col min-w-0 gap-3">
      <div x-show="editorSel !== null && editorZones[editorSel]" class="shrink-0 bg-white rounded-xl border border-surface-200 shadow-sm px-4 py-2.5 flex items-center gap-3 flex-wrap">
        <span class="text-[9px] text-gray-400 font-bold">NOMBRE</span>
        <input type="text" :value="editorZones[editorSel]?.label || ''" @input="editorZones[editorSel].label = $event.target.value.toUpperCase()"
               class="w-32 px-2 py-1 text-xs font-mono font-bold border border-surface-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-400">
        <div class="w-px h-6 bg-surface-200"></div>
        <span class="text-[9px] text-gray-400 font-bold">FUENTE</span>
        <select :value="editorZones[editorSel]?.source || 'none'" @change="editorZones[editorSel].source = $event.target.value"
                class="px-2 py-1 text-[10px] font-mono border border-surface-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-400">
          <option value="none">Sin asignar</option>
          <option value="luk4">LUK4</option>
          <option value="lc300">LC300</option>
          <option value="t48">T48</option>
        </select>
        <div class="w-px h-6 bg-surface-200"></div>
        <span class="text-[9px] text-violet-600 font-bold">POSICION</span>
        <button @click="editorZones[editorSel].left = Math.max(0, editorZones[editorSel].left - 2)" class="w-8 h-8 rounded-lg bg-surface-50 border border-surface-200 hover:bg-surface-100 flex items-center justify-center text-lg active:bg-violet-100">&larr;</button>
        <button @click="editorZones[editorSel].left = Math.min(85, editorZones[editorSel].left + 2)" class="w-8 h-8 rounded-lg bg-surface-50 border border-surface-200 hover:bg-surface-100 flex items-center justify-center text-lg active:bg-violet-100">&rarr;</button>
        <button @click="editorZones[editorSel].top = Math.max(0, editorZones[editorSel].top - 2)" class="w-8 h-8 rounded-lg bg-surface-50 border border-surface-200 hover:bg-surface-100 flex items-center justify-center text-lg active:bg-violet-100">&uarr;</button>
        <button @click="editorZones[editorSel].top = Math.min(85, editorZones[editorSel].top + 2)" class="w-8 h-8 rounded-lg bg-surface-50 border border-surface-200 hover:bg-surface-100 flex items-center justify-center text-lg active:bg-violet-100">&darr;</button>
        <div class="w-px h-6 bg-surface-200"></div>
        <span class="text-[9px] text-blue-600 font-bold">ANCHO</span>
        <button @click="editorZones[editorSel].w = Math.max(3, editorZones[editorSel].w - 2)" class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-200 hover:bg-blue-100 flex items-center justify-center text-blue-600 font-bold active:bg-blue-200">&minus;</button>
        <button @click="editorZones[editorSel].w = Math.min(60, editorZones[editorSel].w + 2)" class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-200 hover:bg-blue-100 flex items-center justify-center text-blue-600 font-bold active:bg-blue-200">&plus;</button>
        <span class="text-[9px] text-blue-600 font-bold">ALTO</span>
        <button @click="editorZones[editorSel].h = Math.max(3, editorZones[editorSel].h - 2)" class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-200 hover:bg-blue-100 flex items-center justify-center text-blue-600 font-bold active:bg-blue-200">&minus;</button>
        <button @click="editorZones[editorSel].h = Math.min(60, editorZones[editorSel].h + 2)" class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-200 hover:bg-blue-100 flex items-center justify-center text-blue-600 font-bold active:bg-blue-200">&plus;</button>
        <div class="w-px h-6 bg-surface-200"></div>
        <span class="text-[9px] font-mono text-gray-400" x-text="editorZones[editorSel]?.left?.toFixed(0)+','+editorZones[editorSel]?.top?.toFixed(0)+' '+editorZones[editorSel]?.w?.toFixed(0)+'x'+editorZones[editorSel]?.h?.toFixed(0)+'%'"></span>
        <div class="flex-1"></div>
        <button @click="editorDelete()" class="w-8 h-8 rounded-lg bg-red-50 border border-red-200 hover:bg-red-100 flex items-center justify-center text-red-500 active:bg-red-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
      <div class="flex-1 min-h-0 bg-white rounded-2xl border-2 border-dashed border-violet-200 relative overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image:linear-gradient(#e2e8f0 1px,transparent 1px),linear-gradient(90deg,#e2e8f0 1px,transparent 1px);background-size:10% 10%"></div>
        <template x-for="(z, idx) in editorZones" :key="z.id">
          <div @click="editorSel = idx" class="absolute rounded-lg flex items-center justify-center transition-all duration-100 border-2 cursor-pointer"
               :class="editorSel === idx ? 'border-violet-500 bg-violet-100 shadow-lg z-10' : 'border-violet-300 bg-violet-50 hover:bg-violet-100'"
               :style="`left:${z.left}%;top:${z.top}%;width:${z.w}%;height:${z.h}%`">
            <span class="font-mono font-bold text-violet-700 text-center leading-tight pointer-events-none text-xs" x-text="z.label"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- ══════════════ Panel detalle expandido ════════════════════════ -->
  <div x-show="selectedZone" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
       x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-50 flex items-center justify-center p-4" @click.self="selectedZone = null" @keydown.escape.window="selectedZone = null">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" @click="selectedZone = null"></div>
    <div x-show="selectedZone" x-transition class="relative bg-white rounded-2xl shadow-2xl border border-surface-200 w-full max-w-2xl max-h-[90vh] overflow-y-auto">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-surface-100 sticky top-0 bg-white z-10">
        <div>
          <div class="text-lg font-bold text-brand-800" x-text="selHs?.label || ''"></div>
          <div class="text-[10px] text-gray-400 font-mono mt-0.5">
            <span x-text="(selHs?.source || 'luk4').toUpperCase()"></span>
            <template x-if="zoneHasData(selHs || {})">
              <span>· Ultimo dato: <span x-text="telemetria.estado_ts || timestamp"></span>
              · <span :class="zoneStatus(selHs || {}) === 'producing' ? 'text-green-600' : zoneStatus(selHs || {}) === 'incidence' ? 'text-red-600' : 'text-gray-500'"
                     x-text="zoneStatus(selHs || {}) === 'producing' ? 'Produciendo' : zoneStatus(selHs || {}) === 'incidence' ? 'Incidencia' : 'Parada'"></span></span>
            </template>
            <template x-if="!zoneHasData(selHs || {})">
              <span>· Sin datos — pendiente de conexion</span>
            </template>
          </div>
        </div>
        <button @click="selectedZone = null" class="text-gray-400 hover:text-gray-600 p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="px-6 py-5 space-y-5">

        <!-- Sin datos (zona sin fuente activa) -->
        <template x-if="!zoneHasData(selHs || {})">
          <div class="text-center py-8 text-gray-300">
            <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="0.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            <p class="text-sm">Sin datos disponibles</p>
            <p class="text-xs mt-1 text-gray-400">Las tablas de telemetria de <span class="font-mono font-bold" x-text="(selHs?.source || '').toUpperCase()"></span> aun no estan conectadas</p>
          </div>
        </template>

        <!-- Datos LUK4 (zona con fuente activa) -->
        <template x-if="zoneHasData(selHs || {})">
          <div class="space-y-5">

        <!-- Alarma activa -->
        <template x-if="alarma">
          <div class="flex items-start gap-3 p-4 bg-red-50 rounded-xl border border-red-200">
            <span class="w-3 h-3 rounded-full bg-red-500 shrink-0 mt-0.5 animate-pulse"></span>
            <div>
              <span class="text-xs font-bold text-red-600" x-text="alarma.componente"></span>
              <span class="text-[10px] text-red-400 ml-2">Error <span x-text="alarma.codigo"></span></span>
              <p class="text-sm text-red-700 mt-1 font-medium" x-text="alarma.mensaje"></p>
            </div>
          </div>
        </template>

        <!-- KPIs: pz/h + piezas + auto -->
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-brand-50 rounded-xl p-4 text-center">
            <div class="text-3xl font-black text-brand-800 font-mono" x-text="telemetria.pph_total ?? '—'"></div>
            <div class="text-[9px] text-brand-600 font-bold uppercase mt-1">pz/h linea</div>
          </div>
          <div class="bg-green-50 rounded-xl p-4 text-center">
            <div class="text-3xl font-black text-green-700 font-mono" x-text="telemetria.piezas_buenas_hoy ?? '—'"></div>
            <div class="text-[9px] text-green-600 font-bold uppercase mt-1">Buenas hoy</div>
          </div>
          <div class="bg-red-50 rounded-xl p-4 text-center">
            <div class="text-3xl font-black text-red-600 font-mono" x-text="telemetria.piezas_malas_hoy ?? '—'"></div>
            <div class="text-[9px] text-red-500 font-bold uppercase mt-1">Malas hoy</div>
          </div>
        </div>

        <!-- Tiempos de ciclo + pz/h por proceso -->
        <div>
          <div class="text-[10px] font-bold text-gray-400 uppercase mb-2">Procesos</div>
          <div class="grid grid-cols-4 gap-2">
            <div class="bg-surface-50 rounded-lg px-3 py-2.5 text-center">
              <div class="font-mono font-black text-lg text-brand-800" x-text="(telemetria.pph_total??'—')"></div>
              <div class="text-[9px] text-gray-400 mt-0.5">Total <span class="font-mono" x-text="(telemetria.ciclo_total??'—')+'s'"></span></div>
            </div>
            <div class="bg-surface-50 rounded-lg px-3 py-2.5 text-center">
              <div class="font-mono font-black text-lg text-amber-700" x-text="(telemetria.pph_torno??'—')"></div>
              <div class="text-[9px] text-gray-400 mt-0.5">Torno <span class="font-mono" x-text="(telemetria.ciclo_torno??'—')+'s'"></span></div>
            </div>
            <div class="bg-surface-50 rounded-lg px-3 py-2.5 text-center">
              <div class="font-mono font-black text-lg text-red-600" x-text="(telemetria.pph_temple??'—')"></div>
              <div class="text-[9px] text-gray-400 mt-0.5">Temple <span class="font-mono" x-text="(telemetria.ciclo_temple??'—')+'s'"></span></div>
            </div>
            <div class="bg-surface-50 rounded-lg px-3 py-2.5 text-center">
              <div class="font-mono font-black text-lg text-violet-700" x-text="(telemetria.pph_revenido??'—')"></div>
              <div class="text-[9px] text-gray-400 mt-0.5">Revenido <span class="font-mono" x-text="(telemetria.ciclo_revenido??'—')+'s'"></span></div>
            </div>
          </div>
          <div class="text-[9px] text-gray-300 text-right mt-1">pz/h por proceso · % auto: <span class="font-mono font-bold text-gray-500" x-text="(telemetria.pct_auto??'—')+'%'"></span></div>
        </div>

        <!-- Grafico pz/h por proceso -->
        <div x-show="timeline.length > 0">
          <div class="text-[10px] font-bold text-gray-400 uppercase mb-2">Evolucion pz/h hoy</div>
          <div class="bg-surface-50 rounded-xl p-3 border border-surface-200">
            <canvas x-ref="chartCanvas" height="140"></canvas>
          </div>
        </div>

        <!-- Top alarmas del dia -->
        <div x-show="topAlarmas.length > 0">
          <div class="text-[10px] font-bold text-gray-400 uppercase mb-2">Alarmas del dia</div>
          <div class="bg-white rounded-xl border border-surface-200 divide-y divide-surface-100 overflow-hidden">
            <template x-for="a in topAlarmas" :key="a.codigo">
              <div class="flex items-center justify-between px-4 py-2.5">
                <div class="flex items-center gap-2 min-w-0">
                  <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-red-50 text-red-500 shrink-0" x-text="a.componente"></span>
                  <span class="text-xs text-gray-700 truncate" x-text="a.mensaje"></span>
                </div>
                <div class="flex items-center gap-3 shrink-0 ml-3">
                  <span class="text-[10px] font-mono text-gray-400" x-text="a.ultimo"></span>
                  <span class="text-[10px] font-mono font-bold text-red-500" x-text="'x' + a.count"></span>
                </div>
              </div>
            </template>
          </div>
        </div>

          </div><!-- /space-y-5 datos -->
        </template>
      </div>
    </div>
  </div>
</div>

<script>
function luk4Page() {
  return {
    // Estado API
    luk4Status: 'stopped', alarma: null, telemetria: {}, timestamp: '', loading: false,
    selectedZone: null, timeline: [], topAlarmas: [], _chart: null,
    // Hotspots (modo normal) — se cargan del servidor en init()
    hotspots: [],
    imgNatW: 0, imgNatH: 0, imgOx: 0, imgOy: 0, imgW: 0, imgH: 0,
    // Editor
    editMode: false,
    editorZones: [],
    editorSel: null,

    // ── Imagen ─────────────────────────────────────────────────────
    onImgLoad(e) {
      this.imgNatW = e.target.naturalWidth;
      this.imgNatH = e.target.naturalHeight;
      this.calcImg();
      new ResizeObserver(() => this.calcImg()).observe(this.$refs.planWrap);
    },
    calcImg() {
      const img = this.$refs.planImg;
      if (!img || !this.imgNatW) return;
      const cW = img.clientWidth, cH = img.clientHeight, r = this.imgNatW / this.imgNatH;
      let w, h;
      if (cW / cH > r) { h = cH; w = h * r; } else { w = cW; h = w / r; }
      this.imgOx = (cW - w) / 2; this.imgOy = (cH - h) / 2; this.imgW = w; this.imgH = h;
    },
    hsStyle(hs) {
      const w = this.imgW, h = this.imgH;
      if (!w || !h) return 'display:none';
      return `left:${this.imgOx+hs.left/100*w}px;top:${this.imgOy+hs.top/100*h}px;width:${hs.width/100*w}px;height:${hs.height/100*h}px`;
    },
    editorHsStyle(z) {
      const w = this.imgW, h = this.imgH;
      if (!w || !h) return 'display:none';
      return `left:${this.imgOx+z.left/100*w}px;top:${this.imgOy+z.top/100*h}px;width:${z.w/100*w}px;height:${z.h/100*h}px`;
    },

    // ── Zonas: styling (color basado en estado global LUK4) ────────
    get selHs() { return this.hotspots.find(h => h.id === this.selectedZone) || null; },
    openZone(id) {
      this.selectedZone = id;
      if (this.zoneHasData(this.selHs || {})) this.$nextTick(() => this.renderChart());
    },
    renderChart() {
      if (!this.timeline.length) return;
      const canvas = this.$refs.chartCanvas;
      if (!canvas) return;
      if (this._chart) this._chart.destroy();
      const labels = this.timeline.map(t => t.t);
      this._chart = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Total', data: this.timeline.map(t => t.total), borderColor: '#1a3a5c', backgroundColor: 'rgba(26,58,92,0.1)', borderWidth: 2.5, tension: 0.3, fill: true, pointRadius: 3 },
            { label: 'Torno', data: this.timeline.map(t => t.torno), borderColor: '#d97706', backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.3, borderDash: [4,2], pointRadius: 2 },
            { label: 'Temple', data: this.timeline.map(t => t.temple), borderColor: '#dc2626', backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.3, borderDash: [4,2], pointRadius: 2 },
            { label: 'Revenido', data: this.timeline.map(t => t.revenido), borderColor: '#7c3aed', backgroundColor: 'transparent', borderWidth: 1.5, tension: 0.3, borderDash: [4,2], pointRadius: 2 },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 10, family: 'monospace' } } },
            tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + ' pz/h' } },
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 9, family: 'monospace' }, maxRotation: 0 } },
            y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10, family: 'monospace' }, callback: v => v + ' pz/h' } },
          },
        },
      });
    },
    // Estado de una zona segun su source
    zoneStatus(hs) {
      const src = hs.source || 'none';
      if (src === 'luk4') return this.luk4Status;
      // lc300, t48, none — sin datos = stopped (gris)
      return 'stopped';
    },
    zoneClass(hs) {
      const s = this.zoneStatus(hs);
      if (s === 'producing') return 'border-green-600 bg-green-500/20';
      if (s === 'incidence') return 'border-red-600 bg-red-500/20';
      return 'border-gray-500 bg-gray-200/40';
    },
    zoneBadgeBorder(hs) {
      const s = this.zoneStatus(hs);
      return s === 'producing' ? 'border-green-500' : s === 'incidence' ? 'border-red-500' : 'border-gray-500';
    },
    zoneDotClass(hs) {
      const s = this.zoneStatus(hs);
      return s === 'producing' ? 'bg-green-500 animate-pulse' : s === 'incidence' ? 'bg-red-500' : 'bg-gray-500';
    },
    zoneHasData(hs) {
      const src = hs.source || 'none';
      return src === 'luk4';  // solo luk4 tiene datos ahora
    },

    // ── Editor ─────────────────────────────────────────────────────
    openEditor() {
      // Copiar hotspots al editor (formato diferente: w/h en vez de width/height)
      this.editorZones = this.hotspots.map(h => ({
        id: h.id, label: h.label,
        left: h.left, top: h.top,
        w: h.width, h: h.height,
        source: h.source || 'none',
      }));
      this.editorSel = null;
      this.editMode = true;
    },
    editorAdd() {
      const name = prompt('Nombre de la zona:');
      if (!name) return;
      const n = this.editorZones.length;
      this.editorZones.push({ id: 'z'+Date.now(), label: name.toUpperCase(), left: 40+(n%3)*5, top: 35+(n%3)*5, w: 14, h: 18, source: 'none' });
      this.editorSel = this.editorZones.length - 1;
    },
    editorDelete() {
      if (this.editorSel === null) return;
      if (!confirm('Eliminar "'+this.editorZones[this.editorSel].label+'"?')) return;
      this.editorZones.splice(this.editorSel, 1);
      this.editorSel = null;
    },
    async editorSave() {
      const data = this.editorZones.map(z => ({
        id: z.id, label: z.label,
        left: +z.left.toFixed(1), top: +z.top.toFixed(1),
        width: +z.w.toFixed(1), height: +z.h.toFixed(1),
        source: z.source || 'none',
      }));
      // Guardar en servidor
      try {
        await fetch('/api/luk4/zonas', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
      } catch {}
      this.hotspots = data;
      this.editMode = false;
      this.$nextTick(() => this.calcImg());
    },
    editorCancel() {
      this.editMode = false;
    },

    // ── Init + refresh ─────────────────────────────────────────────
    async init() {
      // Cargar zonas del servidor
      try {
        const r = await fetch('/api/luk4/zonas');
        if (r.ok) this.hotspots = await r.json();
      } catch {}
      await this.refresh();
      this._interval = setInterval(() => this.refresh(), 30000);
      // Si imagen ya cacheada, @load no dispara — forzar calculo
      this.$nextTick(() => {
        const img = this.$refs.planImg;
        if (img && img.complete && img.naturalWidth > 0) {
          this.imgNatW = img.naturalWidth;
          this.imgNatH = img.naturalHeight;
          this.calcImg();
        }
      });
    },
    async refresh() {
      this.loading = true;
      try {
        const r=await fetch('/api/luk4/status'); if(!r.ok)throw 0; const d=await r.json();
        this.luk4Status=d.luk4_status||'stopped'; this.alarma=d.alarma;
        this.telemetria=d.telemetria||{}; this.timestamp=d.timestamp||'';
        this.timeline=d.timeline||[]; this.topAlarmas=d.top_alarmas||[];
      } catch{}
      this.loading = false;
    },
  };
}
</script>
{% endblock %}
