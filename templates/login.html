<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · {{ app_name }}</title>

  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="stylesheet" href="/static/css/print.css" media="print">

  <script src="/static/js/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full text-body font-sans antialiased min-h-screen px-4 py-5 md:px-8 md:py-8"
      style="background:
        radial-gradient(circle at top left, rgb(var(--color-surface-0)) 0%, rgb(var(--color-surface-0)) 24%, rgb(var(--color-brand-100)) 62%, rgb(var(--color-brand-300)) 100%);">

  <div class="w-full max-w-7xl mx-auto min-h-[calc(100vh-40px)] md:min-h-[calc(100vh-64px)] flex flex-col">

    <header class="pt-1">
      <div class="flex items-center justify-between gap-8">
        <img src="{{ logo_path }}" alt="{{ app_name }}" class="w-28 h-28 md:w-40 md:h-40 object-contain shrink-0"
             onerror="this.style.display='none'">
        <img src="{{ ecs_logo_path }}" alt="{{ company_name }}" class="h-9 md:h-12 object-contain shrink-0"
             onerror="this.style.display='none'">
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center">
      <div class="w-full max-w-[420px]">

        <div class="rounded-[28px] border border-surface-0/50 bg-surface-base/88 shadow-[0_24px_60px_-24px_rgba(15,34,54,0.28)] backdrop-blur-xl">
          <div class="px-7 py-8 md:px-8 md:py-9">
            <div class="mb-7 text-center">
              <h2 class="text-[28px] leading-[1.05] tracking-[-0.03em] font-semibold text-heading">
                Inicio de sesión
              </h2>
              <p class="mt-2 text-sm text-muted">Acceso privado</p>
            </div>

            {% if request.query_params.get('ok') == 'password-cambiado' %}
            <div class="rounded-xl bg-success-subtle text-success border border-subtle p-4 mb-4 text-sm" role="status">
              Contrasena actualizada. Vuelve a iniciar sesion.
            </div>
            {% endif %}

            {% if error %}
            <div class="rounded-xl bg-error-subtle text-error border border-subtle p-4 mb-4 text-sm" role="alert">
              {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="flex flex-col gap-6" autocomplete="on">
              <div class="auth-field">
                <label for="login-email" class="block text-sm font-semibold text-body">Usuario o correo</label>
                <div class="auth-input-wrap">
                  <svg class="auth-input-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25H4.5a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5H4.5A2.25 2.25 0 002.25 6.75m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0l-7.5-4.615A2.25 2.25 0 012.25 6.993V6.75"/>
                  </svg>
                  <input type="text" id="login-email" name="email"
                         required autofocus autocomplete="username"
                         class="input-inline auth-input w-full block"
                         placeholder="usuario o correo@empresa.com">
                </div>
              </div>

              <div class="auth-field">
                <label for="login-password" class="block text-sm font-semibold text-body">Contrasena</label>
                <div class="auth-input-wrap">
                  <svg class="auth-input-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V7.875a4.125 4.125 0 10-8.25 0V10.5m-.75 0h9.75A2.25 2.25 0 0119.5 12.75v6A2.25 2.25 0 0117.25 21h-10.5A2.25 2.25 0 014.5 18.75v-6A2.25 2.25 0 016.75 10.5z"/>
                  </svg>
                  <input type="password" id="login-password" name="password"
                         required autocomplete="current-password"
                         class="input-inline auth-input w-full block"
                         placeholder="Introduce tu contrasena">
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg justify-center w-full">Entrar</button>
            </form>
          </div>
        </div>

        <div class="mt-4 flex justify-center">
          <span class="inline-flex items-center gap-2 px-4 py-2 rounded-pill bg-surface-base/72 text-muted border border-surface-0/50 text-xs font-medium backdrop-blur-md">
            Versión {{ app_version }}
          </span>
        </div>

      </div>
    </main>

  </div>
</body>
</html>
