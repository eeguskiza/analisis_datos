{% extends "base.html" %}
{% block title %}Recursos — OEE Planta{% endblock %}
{% block page_title %}Recursos{% endblock %}

{% block content %}
<div x-data="recursosEditor()" class="max-w-3xl mx-auto space-y-6">

  <!-- Cards por seccion -->
  <template x-for="sec in sections()" :key="sec.name">
    <div class="bg-white rounded-xl border border-surface-200 shadow-sm overflow-hidden">
      <div class="px-5 py-3 border-b border-surface-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold"
                :class="sec.name === 'LINEAS' ? 'bg-blue-100 text-blue-800' : sec.name === 'TALLADORAS' ? 'bg-amber-100 text-amber-800' : 'bg-gray-100 text-gray-600'"
                x-text="sec.name"></span>
          <span class="text-xs text-gray-400" x-text="sec.items.length + ' recursos'"></span>
        </div>
      </div>
      <div class="divide-y divide-surface-100">
        <template x-for="(r, i) in sec.items" :key="r.nombre + i">
          <div class="flex items-center gap-4 px-5 py-3 hover:bg-surface-50 transition-colors">
            <!-- Toggle activo -->
            <button @click="r.activo = !r.activo" class="shrink-0">
              <div class="w-10 h-6 rounded-full transition-colors relative"
                   :class="r.activo ? 'bg-green-500' : 'bg-gray-300'">
                <div class="absolute w-4 h-4 bg-white rounded-full top-1 transition-all shadow"
                     :class="r.activo ? 'left-5' : 'left-1'"></div>
              </div>
            </button>
            <!-- Nombre -->
            <div class="flex-1">
              <span class="font-mono font-semibold text-sm text-brand-800" x-text="r.nombre"></span>
            </div>
            <!-- Centro trabajo -->
            <div class="flex items-center gap-1.5">
              <span class="text-xs text-gray-400">CT:</span>
              <input type="number" x-model.number="r.centro_trabajo"
                     class="w-16 px-2 py-1 text-xs font-mono border border-surface-200 rounded focus:outline-none focus:ring-2 focus:ring-brand-400">
            </div>
            <!-- Borrar -->
            <button @click="removeRecurso(r)" class="text-gray-300 hover:text-red-500 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Anadir + Guardar -->
  <div class="flex items-center justify-between">
    <div class="flex gap-2" x-data="{ showAdd: false }">
      <button @click="showAdd = !showAdd" class="btn-ghost btn-sm">+ Nuevo recurso</button>
      <div x-show="showAdd" x-transition class="flex gap-2 items-center">
        <input type="text" x-ref="newName" placeholder="nombre" class="input-inline w-28 text-xs">
        <input type="number" x-ref="newCt" placeholder="CT" class="input-inline w-16 text-xs">
        <button @click="addRecurso($refs.newName.value, $refs.newCt.value); showAdd=false" class="btn-primary btn-sm">Anadir</button>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span x-show="saved" x-transition class="text-sm text-green-600">Guardado</span>
      <button @click="guardar()" class="btn-primary">Guardar cambios</button>
    </div>
  </div>
</div>

<script>
function recursosEditor() {
  return {
    recursos: {{ recursos | tojson }},
    saved: false,

    sections() {
      const groups = {};
      for (const r of this.recursos) {
        const sec = getSectionForResource(r.nombre);
        if (!groups[sec]) groups[sec] = [];
        groups[sec].push(r);
      }
      return Object.entries(groups).sort().map(([name, items]) => ({ name, items }));
    },

    addRecurso(nombre, ct) {
      if (!nombre) return;
      this.recursos.push({ centro_trabajo: parseInt(ct) || 0, nombre: nombre.trim(), activo: true });
    },

    removeRecurso(r) {
      this.recursos = this.recursos.filter(x => x !== r);
    },

    async guardar() {
      await fetch('/api/recursos', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recursos: this.recursos }),
      });
      this.saved = true;
      setTimeout(() => this.saved = false, 2000);
      showToast('Recursos guardados');
    }
  };
}
</script>
{% endblock %}
