{% extends "base.html" %}
{% block title %}Dashboard — OEE Planta{% endblock %}
{% block page_title %}{% endblock %}

{% block content %}
<div x-data="dashboardData()" x-init="checkServices()" class="flex items-center justify-center" style="min-height: calc(100vh - 120px);">

  <!-- Banner 3D con los 3 indicadores -->
  <div class="w-full max-w-4xl">

    <!-- Titulo -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-brand-800 tracking-tight">OEE Planta</h1>
      <p class="text-sm text-gray-400 mt-1">Estado de los servicios</p>
    </div>

    <!-- 3 cards con efecto 3D -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">

      <!-- Web App -->
      <div class="group relative">
        <div class="absolute -inset-1 rounded-2xl opacity-50 blur-lg transition-all duration-500"
             :class="services.web.ok ? 'bg-green-400 group-hover:opacity-75' : 'bg-red-400'"></div>
        <div class="relative bg-white rounded-2xl p-6 shadow-xl border border-surface-200
                    transform transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
          <div class="flex flex-col items-center text-center gap-4">
            <!-- LED grande -->
            <div class="relative">
              <div class="w-16 h-16 rounded-full flex items-center justify-center"
                   :class="services.web.ok ? 'bg-green-100' : services.web.ok === false ? 'bg-red-100' : 'bg-yellow-100'">
                <div class="w-8 h-8 rounded-full shadow-lg"
                     :class="services.web.ok ? 'bg-green-500 shadow-green-500/50' : services.web.ok === false ? 'bg-red-500 shadow-red-500/50' : 'bg-yellow-500 shadow-yellow-500/50 animate-pulse'"></div>
              </div>
              <div x-show="services.web.ok" class="absolute inset-0 w-16 h-16 rounded-full bg-green-400 animate-ping opacity-20"></div>
            </div>
            <div>
              <div class="font-bold text-gray-800">Web App</div>
              <div class="text-xs text-gray-400 mt-1 h-4" x-text="services.web.ok ? 'Operativo' : services.web.msg"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Base de datos -->
      <div class="group relative">
        <div class="absolute -inset-1 rounded-2xl opacity-50 blur-lg transition-all duration-500"
             :class="services.db.ok ? 'bg-green-400 group-hover:opacity-75' : services.db.ok === false ? 'bg-red-400' : 'bg-yellow-400'"></div>
        <div class="relative bg-white rounded-2xl p-6 shadow-xl border border-surface-200
                    transform transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
          <div class="flex flex-col items-center text-center gap-4">
            <div class="relative">
              <div class="w-16 h-16 rounded-full flex items-center justify-center"
                   :class="services.db.ok ? 'bg-green-100' : services.db.ok === false ? 'bg-red-100' : 'bg-yellow-100'">
                <div class="w-8 h-8 rounded-full shadow-lg"
                     :class="services.db.ok ? 'bg-green-500 shadow-green-500/50' : services.db.ok === false ? 'bg-red-500 shadow-red-500/50' : 'bg-yellow-500 shadow-yellow-500/50 animate-pulse'"></div>
              </div>
              <div x-show="services.db.ok" class="absolute inset-0 w-16 h-16 rounded-full bg-green-400 animate-ping opacity-20"></div>
            </div>
            <div>
              <div class="font-bold text-gray-800">Base de datos</div>
              <div class="text-xs text-gray-400 mt-1 h-4" x-text="services.db.ok ? 'PostgreSQL OK' : services.db.msg"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- BD MES -->
      <div class="group relative">
        <div class="absolute -inset-1 rounded-2xl opacity-50 blur-lg transition-all duration-500"
             :class="services.mes.ok ? 'bg-green-400 group-hover:opacity-75' : services.mes.ok === false ? 'bg-red-400' : 'bg-yellow-400'"></div>
        <div class="relative bg-white rounded-2xl p-6 shadow-xl border border-surface-200
                    transform transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
          <div class="flex flex-col items-center text-center gap-4">
            <div class="relative">
              <div class="w-16 h-16 rounded-full flex items-center justify-center"
                   :class="services.mes.ok ? 'bg-green-100' : services.mes.ok === false ? 'bg-red-100' : 'bg-yellow-100'">
                <div class="w-8 h-8 rounded-full shadow-lg"
                     :class="services.mes.ok ? 'bg-green-500 shadow-green-500/50' : services.mes.ok === false ? 'bg-red-500 shadow-red-500/50' : 'bg-yellow-500 shadow-yellow-500/50 animate-pulse'"></div>
              </div>
              <div x-show="services.mes.ok" class="absolute inset-0 w-16 h-16 rounded-full bg-green-400 animate-ping opacity-20"></div>
            </div>
            <div>
              <div class="font-bold text-gray-800">BD MES</div>
              <div class="text-xs text-gray-400 mt-1 h-4 max-w-[180px] truncate"
                   x-text="services.mes.ok ? (services.mes.database + ' @ ' + services.mes.server) : 'Sin conexion'"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Refresh -->
    <div class="text-center mt-8">
      <button @click="checkServices()" class="text-xs text-gray-400 hover:text-brand-600 transition-colors" :disabled="checking">
        <span x-show="checking" class="spinner border-gray-400 mr-1"></span>
        <span x-text="checking ? 'Comprobando...' : 'Actualizar estado'"></span>
      </button>
    </div>
  </div>
</div>

<script>
function dashboardData() {
  return {
    checking: false,
    services: {
      web: { ok: null, msg: 'Comprobando...' },
      db:  { ok: null, msg: 'Comprobando...' },
      mes: { ok: null, msg: 'Comprobando...', server: '', database: '' },
    },
    async checkServices() {
      this.checking = true;
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        this.services = {
          web: data.services.web || { ok: true, msg: 'Operativo' },
          db:  data.services.db  || { ok: false, msg: 'No disponible' },
          mes: data.services.mes || { ok: false, msg: 'No configurado', server: '', database: '' },
        };
      } catch (e) {
        this.services.web = { ok: false, msg: 'Error de red' };
      }
      this.checking = false;
    }
  };
}
</script>
{% endblock %}
