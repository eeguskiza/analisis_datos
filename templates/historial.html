{% extends "base.html" %}
{% block title %}Historial — OEE Planta{% endblock %}
{% block page_title %}Historial de ejecuciones{% endblock %}

{% block content %}
<div x-data="historialPage()" x-init="load()" class="space-y-6">

  <div class="card">
    <div class="card-header flex items-center justify-between">
      <span>Ejecuciones del pipeline</span>
      <button @click="load()" class="btn-ghost btn-sm">Actualizar</button>
    </div>
    <div class="overflow-x-auto">
      <table class="data-table">
        <thead>
          <tr>
            <th class="w-12">#</th>
            <th>Periodo</th>
            <th class="w-24">Origen</th>
            <th class="w-20">Estado</th>
            <th class="w-20">PDFs</th>
            <th>Modulos</th>
            <th class="w-36">Fecha</th>
            <th class="w-12"></th>
          </tr>
        </thead>
        <tbody>
          <template x-if="loading">
            <tr><td colspan="8" class="text-center py-6 text-gray-400"><span class="spinner border-brand-600"></span></td></tr>
          </template>
          <template x-if="!loading && ejecuciones.length === 0">
            <tr><td colspan="8" class="text-center py-6 text-gray-400">Sin ejecuciones registradas.</td></tr>
          </template>
          <template x-for="e in ejecuciones" :key="e.id">
            <tr class="cursor-pointer" @click="toggleDetail(e.id)">
              <td class="font-mono text-xs text-gray-400" x-text="e.id"></td>
              <td>
                <span class="text-sm font-medium" x-text="e.fecha_inicio === e.fecha_fin ? e.fecha_inicio : e.fecha_inicio + ' → ' + e.fecha_fin"></span>
              </td>
              <td>
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                      :class="e.source === 'db' ? 'bg-blue-100 text-blue-800' : e.source === 'excel' ? 'bg-purple-100 text-purple-800' : 'bg-gray-100 text-gray-600'"
                      x-text="e.source"></span>
              </td>
              <td>
                <span class="inline-flex items-center gap-1 text-xs font-medium">
                  <span class="w-2 h-2 rounded-full"
                        :class="e.status === 'completed' ? 'bg-green-500' : e.status === 'running' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500'"></span>
                  <span x-text="e.status === 'completed' ? 'OK' : e.status === 'running' ? 'Ejecutando' : 'Error'"></span>
                </span>
              </td>
              <td class="font-mono text-sm" x-text="e.n_pdfs"></td>
              <td class="text-xs text-gray-500" x-text="e.modulos"></td>
              <td class="text-xs text-gray-500" x-text="formatDate(e.created_at)"></td>
              <td>
                <button @click.stop="borrar(e.id)" class="text-red-400 hover:text-red-600 p-1" title="Borrar">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                </button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Detail panel -->
  <template x-if="detail">
    <div class="card">
      <div class="card-header flex items-center justify-between">
        <span>Ejecucion #<span x-text="detail.id"></span> — <span x-text="detail.fecha_inicio"></span></span>
        <button @click="detail = null" class="btn-ghost btn-sm">Cerrar</button>
      </div>
      <div class="card-body space-y-4">
        <!-- Log -->
        <div>
          <div class="text-xs font-semibold text-gray-500 uppercase mb-1">Log</div>
          <div class="log-console" x-text="detail.log || '(sin log)'"></div>
        </div>
        <!-- PDFs -->
        <div x-show="detail.informes && detail.informes.length > 0">
          <div class="text-xs font-semibold text-gray-500 uppercase mb-1">Informes generados</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
            <template x-for="inf in detail.informes" :key="inf.id">
              <a :href="'/api/informes/pdf/' + inf.pdf_path" target="_blank"
                 class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-100 text-sm text-brand-700 border border-surface-200">
                <svg class="w-4 h-4 text-red-400 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
                </svg>
                <div class="min-w-0">
                  <div class="truncate text-xs font-medium" x-text="inf.pdf_path.split('/').pop()"></div>
                  <div class="text-xs text-gray-400" x-text="[inf.seccion, inf.maquina].filter(Boolean).join(' / ')"></div>
                </div>
              </a>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function historialPage() {
  return {
    ejecuciones: [],
    detail: null,
    loading: true,

    async load() {
      this.loading = true;
      const res = await fetch('/api/historial');
      const data = await res.json();
      this.ejecuciones = data.ejecuciones || [];
      this.loading = false;
    },

    async toggleDetail(id) {
      if (this.detail && this.detail.id === id) {
        this.detail = null;
        return;
      }
      const res = await fetch(`/api/historial/${id}`);
      this.detail = await res.json();
    },

    async borrar(id) {
      if (!confirm('Borrar ejecucion #' + id + '?')) return;
      await fetch(`/api/historial/${id}`, { method: 'DELETE' });
      if (this.detail && this.detail.id === id) this.detail = null;
      await this.load();
      showToast('Ejecucion borrada');
    },

    formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('es-ES') + ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
  };
}
</script>
{% endblock %}
