services:
  # ── Base de datos local ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${NEXO_PG_USER:-${OEE_PG_USER:-oee}}
      POSTGRES_PASSWORD: ${NEXO_PG_PASSWORD:-${OEE_PG_PASSWORD:-oee}}
      POSTGRES_DB: ${NEXO_PG_DB:-${OEE_PG_DB:-oee_planta}}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXO_PG_USER:-${OEE_PG_USER:-oee}} -d ${NEXO_PG_DB:-${OEE_PG_DB:-oee_planta}}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Aplicacion web ─────────────────────────────────────────────────────────
  web:
    build: .
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./informes:/app/informes
    environment:
      - NEXO_DATA_DIR=/app/data
      - NEXO_INFORMES_DIR=/app/informes
      - NEXO_DATABASE_URL=postgresql://${NEXO_PG_USER:-${OEE_PG_USER:-oee}}:${NEXO_PG_PASSWORD:-${OEE_PG_PASSWORD:-oee}}@db:5432/${NEXO_PG_DB:-${OEE_PG_DB:-oee_planta}}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Reverse proxy HTTPS (acceso LAN) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  # ── MCP Server ──────────────────────────────────────────────────────────────
  mcp:
    build: ./mcp
    environment:
      - NEXO_API_URL=http://web:8000
      - OEE_API_URL=http://web:8000  # compat, se retira en Mark-IV
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
