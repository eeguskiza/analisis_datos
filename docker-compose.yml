services:
  # ── Base de datos local ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${OEE_PG_USER:-oee}
      POSTGRES_PASSWORD: ${OEE_PG_PASSWORD:-oee}
      POSTGRES_DB: ${OEE_PG_DB:-oee_planta}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OEE_PG_USER:-oee} -d ${OEE_PG_DB:-oee_planta}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Aplicacion web ─────────────────────────────────────────────────────────
  web:
    build: .
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./informes:/app/informes
    environment:
      - OEE_DATA_DIR=/app/data
      - OEE_INFORMES_DIR=/app/informes
      - OEE_DATABASE_URL=postgresql://${OEE_PG_USER:-oee}:${OEE_PG_PASSWORD:-oee}@db:5432/${OEE_PG_DB:-oee_planta}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Reverse proxy HTTPS (acceso LAN) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  # ── MCP Server ──────────────────────────────────────────────────────────────
  mcp:
    build: ./mcp
    environment:
      - OEE_API_URL=http://web:8000
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
