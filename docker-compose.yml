services:
  # ── Base de datos local ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${NEXO_PG_USER:-${OEE_PG_USER:-oee}}
      POSTGRES_PASSWORD: ${NEXO_PG_PASSWORD:-${OEE_PG_PASSWORD:-oee}}
      POSTGRES_DB: ${NEXO_PG_DB:-${OEE_PG_DB:-oee_planta}}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host 5433 -> container 5432. El host 5432 tenia otro proceso (Postgres
      # nativo u otro container). Web sigue conectando por red interna de
      # compose al puerto 5432 del container (NEXO_PG_HOST=db, NEXO_PG_PORT=5432);
      # el mapeo al host solo afecta a 'psql' directo desde el host.
      # Para acceder al Postgres de Nexo desde el host:
      #     psql -h localhost -p 5433 -U <NEXO_PG_USER> <NEXO_PG_DB>
      - "${NEXO_PG_HOST_PORT:-5433}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXO_PG_USER:-${OEE_PG_USER:-oee}} -d ${NEXO_PG_DB:-${OEE_PG_DB:-oee_planta}}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Aplicacion web ─────────────────────────────────────────────────────────
  web:
    build: .
    expose:
      - "8000"
    ports:
      # Host ${NEXO_WEB_HOST_PORT:-8001} -> container 8000. Por defecto 8001
      # para no colisionar con dev servers locales que usan 8000. Caddy sigue
      # llegando al web por la red interna de compose en el puerto 8000.
      - "${NEXO_WEB_HOST_PORT:-8001}:8000"
    volumes:
      - ./data:/app/data
      - ./informes:/app/informes
      # tests/data/reference/ guarda PDFs baseline del gate de regresion
      # (Plan 03-02 success #5). Bind-mount necesario para que los baseline
      # sobrevivan a 'docker compose up --build' — sin el mount, el rebuild
      # reemplaza la imagen y los .pdf se pierden con el container viejo.
      - ./tests:/app/tests
    # Inyecta el .env del host al container. Necesario para NEXO_SECRET_KEY
    # y demas vars que pydantic-settings lee. El Dockerfile NO copia .env
    # a la imagen (correcto — secretos nunca en imagen); el bind de env
    # garantiza que el container recibe los valores reales en runtime.
    env_file:
      - .env
    environment:
      - NEXO_DATA_DIR=/app/data
      - NEXO_INFORMES_DIR=/app/informes
      - NEXO_DATABASE_URL=postgresql://${NEXO_PG_USER:-${OEE_PG_USER:-oee}}:${NEXO_PG_PASSWORD:-${OEE_PG_PASSWORD:-oee}}@db:5432/${NEXO_PG_DB:-${OEE_PG_DB:-oee_planta}}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Reverse proxy HTTPS (acceso LAN) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  # ── MCP Server ──────────────────────────────────────────────────────────────
  mcp:
    build: ./mcp
    container_name: nexo-mcp
    profiles: ["mcp"]  # no arranca con 'make up'; requiere --profile mcp
    environment:
      - NEXO_API_URL=http://web:8000
      - OEE_API_URL=http://web:8000  # compat, se retira en Mark-IV
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
