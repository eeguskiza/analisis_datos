name: CI

on:
  push:
    branches:
      - main
      - feature/Mark-III
  pull_request:
    branches:
      - main
      - feature/Mark-III

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      # Format check no bloquea Sprint 0 — el codigo legacy no ha pasado por
      # ruff format todavia. El commit masivo de format llega en Sprint 6.
      - name: Ruff format --check
        continue-on-error: true
        run: ruff format --check .

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-24.04
    # No bloquea merges en Sprint 0. Se volvera bloqueante en Sprint 6
    # cuando haya cobertura y tests de routers.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  # ── Docker build (sin push) ────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build nexo-web image
        run: docker build -t nexo-web:ci .

      - name: Build nexo-mcp image
        run: docker build -t nexo-mcp:ci ./mcp

  # ── Secret scan ────────────────────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    # No bloquea Sprint 0 — SECURITY_AUDIT.md ya documenta los hallazgos
    # conocidos del historial y la rotacion va fuera del sprint.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
